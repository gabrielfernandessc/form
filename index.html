<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Ministério ELIM</title>
  <meta name="description" content="Cadastro de jovens para o Ministério ELIM. Faça parte da nossa comunidade!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --surface-hover: #16162a;
      --purple: #7c3aed;
      --purple-light: #a855f7;
      --purple-glow: rgba(124, 58, 237, .35);
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, .25);
      --red: #ef4444;
      --text: #f0e6ff;
      --text-muted: #a89ec8;
      --border: rgba(124, 58, 237, .25);
      --radius: 14px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* ── Background Glow ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 500px at 50% 10%, rgba(124, 58, 237, .18), transparent),
        radial-gradient(ellipse 400px 350px at 80% 70%, rgba(168, 85, 247, .10), transparent),
        radial-gradient(ellipse 350px 300px at 15% 60%, rgba(124, 58, 237, .08), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px 40px;
      box-shadow: 0 0 80px rgba(124, 58, 237, .08);
    }

    /* ── Header ──────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header__logo {
      font-family: var(--font-display);
      font-size: 4rem;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--purple-light), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .header__sub {
      font-family: var(--font-display);
      font-size: 1.15rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .header__divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--purple), var(--purple-light));
      border-radius: 2px;
      margin: 16px auto 0;
    }

    /* ── Photo Upload ────────────────────────────────── */
    .photo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .photo-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
      position: relative;
      background: var(--bg);
    }

    .photo-circle:hover,
    .photo-circle:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 20px var(--purple-glow);
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-circle.has-photo img { display: block; }
    .photo-circle.has-photo .photo-icon { display: none; }

    .photo-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: .8rem;
      pointer-events: none;
    }

    .photo-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--purple-light);
    }

    .photo-label {
      font-size: .78rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    #photoInput { display: none; }

    /* ── Form Fields ─────────────────────────────────── */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: .5px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .95rem;
      outline: none;
      transition: border-color .3s, box-shadow .3s;
    }

    .field input::placeholder {
      color: rgba(168, 158, 200, .4);
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .field input.invalid {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, .2);
    }

    .field .error-msg {
      font-size: .75rem;
      color: var(--red);
      margin-top: 4px;
      display: none;
    }

    .field input.invalid + .error-msg {
      display: block;
    }

    /* ── Submit Button ───────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: #fff;
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .5px;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s, opacity .25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .btn-submit:hover:not(:disabled) {
      transform: scale(1.03);
      box-shadow: 0 4px 30px var(--purple-glow);
    }

    .btn-submit:active:not(:disabled) {
      transform: scale(.98);
    }

    .btn-submit:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    /* ── Spinner ──────────────────────────────────────── */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }

    .btn-submit.loading .spinner { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Toast / Feedback ────────────────────────────── */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      padding: 16px 28px;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: .95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
      opacity: 0;
      transition: transform .5s cubic-bezier(.22,1,.36,1), opacity .5s;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
      max-width: 90vw;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: linear-gradient(135deg, #064e3b, #065f46);
      border: 1px solid rgba(34, 197, 94, .4);
      color: #bbf7d0;
    }

    .toast.error {
      background: linear-gradient(135deg, #450a0a, #7f1d1d);
      border: 1px solid rgba(239, 68, 68, .4);
      color: #fecaca;
    }

    .toast-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* ── Animations ───────────────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate {
      opacity: 0;
      animation: fadeUp .6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .delay-1 { animation-delay: .08s; }
    .delay-2 { animation-delay: .16s; }
    .delay-3 { animation-delay: .24s; }
    .delay-4 { animation-delay: .32s; }
    .delay-5 { animation-delay: .40s; }
    .delay-6 { animation-delay: .48s; }
    .delay-7 { animation-delay: .56s; }
    .delay-8 { animation-delay: .64s; }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 560px) {
      .card {
        padding: 36px 20px 28px;
        border-radius: 12px;
      }

      .header__logo {
        font-size: 3rem;
        letter-spacing: 4px;
      }

      .header__sub {
        font-size: 1rem;
      }

      .photo-circle {
        width: 100px;
        height: 100px;
      }

      .field input {
        padding: 12px 14px;
        font-size: .9rem;
      }

      .btn-submit {
        padding: 14px;
      }
    }

    /* ── Footer Note ─────────────────────────────────── */
    .footer-note {
      text-align: center;
      font-size: .72rem;
      color: rgba(168,158,200,.4);
      margin-top: 20px;
      letter-spacing: .3px;
    }
  </style>
</head>
<body>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon"></span>
    <span id="toastMsg"></span>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Header -->
    <div class="header animate delay-1">
      <div class="header__logo">ELIM</div>
      <div class="header__sub">MINISTÉRIO DE JOVENS</div>
      <div class="header__divider"></div>
    </div>

    <form id="cadastroForm" novalidate autocomplete="off">
      <!-- Photo -->
      <div class="photo-wrapper animate delay-2">
        <div class="photo-circle" id="photoCircle" tabindex="0" role="button" aria-label="Selecionar foto de perfil">
          <div class="photo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/>
            </svg>
            <span>Adicionar foto</span>
          </div>
          <img id="photoPreview" alt="Preview da foto" />
        </div>
        <input type="file" id="photoInput" accept="image/*" />
        <span class="photo-label">Foto de perfil</span>
      </div>

      <!-- Nome -->
      <div class="field animate delay-3">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Maria da Silva" required />
        <span class="error-msg">Informe seu nome completo.</span>
      </div>

      <!-- Aniversário -->
      <div class="field animate delay-4">
        <label for="aniversario">Data de aniversário</label>
        <input type="date" id="aniversario" required />
        <span class="error-msg">Selecione sua data de aniversário.</span>
      </div>

      <!-- E-mail -->
      <div class="field animate delay-5">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
        <span class="error-msg">Informe um e-mail válido.</span>
      </div>

      <!-- Celular -->
      <div class="field animate delay-6">
        <label for="celular">Número de celular</label>
        <input type="tel" id="celular" placeholder="(00) 00000-0000" required maxlength="15" />
        <span class="error-msg">Informe um número de celular válido.</span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit animate delay-7" id="btnSubmit">
        <span class="spinner"></span>
        <span id="btnText">Cadastrar</span>
      </button>

      <p class="footer-note animate delay-8">Seus dados serão usados apenas para comunicação do ministério.</p>
    </form>
  </div>

  <script>
    // ╔═══════════════════════════════════════════════════════════╗
    // ║  CONFIGURAÇÕES — Troque as chaves abaixo                ║
    // ╚═══════════════════════════════════════════════════════════╝
    const IMGBB_API_KEY   = "fc5294ef0c479a8a606ed0194b717aa5";
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzT1vK7ERXbHyPqd-jy6Ix2HwDh4Y0VYCRkvB-ahldQ42LqYlzQjYgcKAlSzqMBYADi/exec";

    // ── Elementos ───────────────────────────────────────────────
    const form        = document.getElementById('cadastroForm');
    const photoCircle = document.getElementById('photoCircle');
    const photoInput  = document.getElementById('photoInput');
    const photoPreview= document.getElementById('photoPreview');
    const btnSubmit   = document.getElementById('btnSubmit');
    const btnText     = document.getElementById('btnText');
    const toast       = document.getElementById('toast');
    const toastIcon   = document.getElementById('toastIcon');
    const toastMsg    = document.getElementById('toastMsg');

    let selectedFile = null;

    // ── Photo click/keyboard ────────────────────────────────────
    photoCircle.addEventListener('click', () => photoInput.click());
    photoCircle.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        photoInput.click();
      }
    });

    // ── Photo preview ───────────────────────────────────────────
    photoInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        photoPreview.src = ev.target.result;
        photoCircle.classList.add('has-photo');
      };
      reader.readAsDataURL(file);
    });

    // ── Máscara de celular ──────────────────────────────────────
    const celularInput = document.getElementById('celular');
    celularInput.addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 7) {
        v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
      } else if (v.length > 2) {
        v = `(${v.slice(0,2)}) ${v.slice(2)}`;
      } else if (v.length > 0) {
        v = `(${v}`;
      }
      e.target.value = v;
    });

    // ── Validação ───────────────────────────────────────────────
    function validate() {
      let ok = true;
      const nome   = document.getElementById('nome');
      const aniv   = document.getElementById('aniversario');
      const email  = document.getElementById('email');
      const cel    = document.getElementById('celular');

      // Nome
      if (nome.value.trim().length < 3) {
        nome.classList.add('invalid'); ok = false;
      } else {
        nome.classList.remove('invalid');
      }

      // Aniversário
      if (!aniv.value) {
        aniv.classList.add('invalid'); ok = false;
      } else {
        aniv.classList.remove('invalid');
      }

      // E-mail
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(email.value)) {
        email.classList.add('invalid'); ok = false;
      } else {
        email.classList.remove('invalid');
      }

      // Celular — deve ter 15 chars formatados: (XX) XXXXX-XXXX
      if (cel.value.replace(/\D/g, '').length < 10) {
        cel.classList.add('invalid'); ok = false;
      } else {
        cel.classList.remove('invalid');
      }

      // Foto
      if (!selectedFile) {
        photoCircle.style.borderColor = 'var(--red)';
        photoCircle.style.boxShadow = '0 0 20px rgba(239,68,68,.25)';
        ok = false;
      } else {
        photoCircle.style.borderColor = '';
        photoCircle.style.boxShadow = '';
      }

      return ok;
    }

    // Remove invalid on input
    document.querySelectorAll('.field input').forEach(inp => {
      inp.addEventListener('input', () => inp.classList.remove('invalid'));
    });

    // ── Toast ───────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(type, msg) {
      clearTimeout(toastTimer);
      toast.className = 'toast ' + type;
      toastIcon.textContent = type === 'success' ? '✓' : '✕';
      toastMsg.textContent = msg;
      requestAnimationFrame(() => toast.classList.add('show'));
      toastTimer = setTimeout(() => toast.classList.remove('show'), 5000);
    }

    // ── Loading state ───────────────────────────────────────────
    function setLoading(loading) {
      btnSubmit.disabled = loading;
      if (loading) {
        btnSubmit.classList.add('loading');
        btnText.textContent = 'Enviando...';
      } else {
        btnSubmit.classList.remove('loading');
        btnText.textContent = 'Cadastrar';
      }
    }

    // ── Converter arquivo para base64 puro ──────────────────────
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          // Remove o prefixo "data:image/...;base64,"
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ── Upload para imgbb ───────────────────────────────────────
    async function uploadToImgbb(base64) {
      const formData = new FormData();
      formData.append('image', base64);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
        method: 'POST',
        body: formData
      });
      if (!res.ok) throw new Error('Erro ao fazer upload da imagem');
      const json = await res.json();
      if (!json.success) throw new Error(json.error?.message || 'Falha no upload da imagem');
      return json.data.url;
    }

    // ── Enviar para Google Sheets ───────────────────────────────
    async function sendToSheets(payload) {
      const res = await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'text/plain' }
      });
      if (!res.ok) throw new Error('Erro ao salvar dados na planilha');
    }

    // ── Reset form ──────────────────────────────────────────────
    function resetForm() {
      form.reset();
      selectedFile = null;
      photoPreview.src = '';
      photoCircle.classList.remove('has-photo');
      document.querySelectorAll('.field input').forEach(inp => inp.classList.remove('invalid'));
      photoCircle.style.borderColor = '';
      photoCircle.style.boxShadow = '';
    }

    // ── Submit ──────────────────────────────────────────────────
    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (!validate()) return;

      setLoading(true);
      try {
        // 1. Upload da foto
        const base64 = await fileToBase64(selectedFile);
        const fotoUrl = await uploadToImgbb(base64);

        // 2. Enviar dados para Google Sheets
        const payload = {
          nome: document.getElementById('nome').value.trim(),
          aniversario: document.getElementById('aniversario').value,
          foto: fotoUrl,
          email: document.getElementById('email').value.trim(),
          celular: document.getElementById('celular').value.trim()
        };

        await sendToSheets(payload);

        showToast('success', 'Cadastro realizado com sucesso! 🎉');
        resetForm();
      } catch (err) {
        console.error(err);
        showToast('error', err.message || 'Ocorreu um erro. Tente novamente.');
      } finally {
        setLoading(false);
      }
    });
  </script>

  <!--
  ╔═══════════════════════════════════════════════════════════════════╗
  ║  GOOGLE APPS SCRIPT — Cole este código no editor do Apps Script ║
  ║  (Extensions > Apps Script) da sua planilha Google Sheets.       ║

  ║  Copie a URL gerada e cole na variável GOOGLE_SCRIPT_URL acima.  ║
  ╚═══════════════════════════════════════════════════════════════════╝

  function doPost(e) {
    const data = JSON.parse(e.postData.contents);
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    sheet.appendRow([
      new Date(),
      data.nome,
      data.aniversario,
      data.foto,
      data.email,
      data.celular
    ]);
    return ContentService.createTextOutput("OK");
  }

</body>
</html>
